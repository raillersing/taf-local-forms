services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-taf_local_forms}"
      POSTGRES_USER: "${POSTGRES_USER:-taf}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-taf-dev-only}"
    volumes:
      - taf_local_forms_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taf} -d ${POSTGRES_DB:-taf_local_forms}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    ports:
      - "${TAF_HOST_PORT:-8010}:8000"
    environment:
      DEBUG: "${DEBUG:-false}"
      SECRET_KEY: "${SECRET_KEY:-change-me-for-docker-local-use}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1,[::1]}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}"
      DATABASE_URL: "${DATABASE_URL:-}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/db.sqlite3}"
      DB_HOST: "${DB_HOST:-db}"
      DB_PORT: "${DB_PORT:-5432}"
      DB_NAME: "${POSTGRES_DB:-taf_local_forms}"
      DB_USER: "${POSTGRES_USER:-taf}"
      DB_PASSWORD: "${POSTGRES_PASSWORD:-taf-dev-only}"
      TIME_ZONE: "${TIME_ZONE:-Indian/Antananarivo}"
      WEB_CONCURRENCY: "${WEB_CONCURRENCY:-2}"
      WEB_THREADS: "${WEB_THREADS:-4}"
      GUNICORN_TIMEOUT: "${GUNICORN_TIMEOUT:-60}"
    volumes:
      - taf_local_forms_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  taf_local_forms_data:
  taf_local_forms_pgdata:
