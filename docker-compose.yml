services:
  web:
    build: .
    ports:
      - "${TAF_HOST_PORT:-8010}:8000"
    environment:
      DEBUG: "${DEBUG:-false}"
      SECRET_KEY: "${SECRET_KEY:-change-me-for-docker-local-use}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-localhost,127.0.0.1,[::1]}"
      CSRF_TRUSTED_ORIGINS: "${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}"
      DATABASE_PATH: "${DATABASE_PATH:-/app/data/db.sqlite3}"
      TIME_ZONE: "${TIME_ZONE:-Indian/Antananarivo}"
    volumes:
      - taf_local_forms_data:/app/data

volumes:
  taf_local_forms_data:
